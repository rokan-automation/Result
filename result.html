<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Transcript | Birganj Govt. College</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --primary: #1abc9c; --secondary: #34495e; --bg: #f4f7f6; --white: #ffffff; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #e0f2fe 0%, #e0e7ff 50%, #f3e8ff 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .transcript-container {
            background: rgba(255, 255, 255, 0.95);
            max-width: 800px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(30, 41, 59, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 40px;
            position: relative;
        }

        .header-section {
            text-align: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .header-section h2 { color: var(--primary); font-size: 24px; margin-bottom: 5px; }
        .header-section p { color: #64748b; font-size: 14px; }
        .header-section .doc-title { 
            display: inline-block;
            margin-top: 15px;
            background: var(--secondary);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .student-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 1px solid #edf2f7;
        }

        .info-item { font-size: 14px; color: #334155; }
        .info-item strong { color: var(--secondary); }

        .table-res { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        .table-res th, .table-res td { border: 1px solid #edf2f7; padding: 12px; text-align: center; font-size: 13.5px; }
        .table-res th { background: #f1f5f9; color: var(--secondary); font-weight: bold; }
        .table-container { width: 100%; overflow-x: auto; margin-bottom: 25px; border-radius: 8px; border: 1px solid #e2e8f0; }

        .result-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .result-summary.fail {
            background: #fef2f2;
            border-color: #fca5a5;
        }

        .gpa-box { font-size: 18px; font-weight: bold; color: var(--success); }
        .gpa-box.fail { color: var(--danger); }

        .btn-group { display: flex; gap: 15px; justify-content: flex-end; }
        .btn { 
            padding: 12px 24px; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px; 
            transition: 0.3s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #16a085; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-secondary:hover { background: #2c3e50; }

        /* Custom Popup */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); display: none; justify-content: center; align-items: center; z-index: 10000; backdrop-filter: blur(5px); }
        .modal-box { background: white; padding: 35px 30px; border-radius: 16px; width: 90%; max-width: 440px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-top: 6px solid var(--primary); }
        .modal-box.warning { border-top-color: var(--warning); }
        .modal-box.error { border-top-color: var(--danger); }
        .modal-box.success { border-top-color: var(--success); }
        #popTitle { font-size: 18px; font-weight: 700; color: #1e293b; margin-top: 5px; }
        #popMsg { font-size: 14px; line-height: 1.5; color: #64748b; margin-top: 10px; }
        .modal-btn-group { display: flex; gap: 12px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
        .modal-btn { padding: 10px 22px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; }
        .btn-ok { background: var(--primary); color: white; }
        .btn-cancel { background: #f1f5f9; color: #475569; }

        @media (max-width: 600px) {
            .transcript-container { padding: 20px; }
            .result-summary { flex-direction: column; gap: 10px; text-align: center; }
            .btn-group { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body onload="loadTranscript()">

    <div class="modal-overlay" id="customPopup">
        <div class="modal-box">
            <h3 id="popTitle">Notification</h3>
            <p id="popMsg"></p>
            <div class="modal-btn-group" id="popBtns"></div>
        </div>
    </div>

    <div class="transcript-container" id="mainContainer" style="display: none;">
        <div class="header-section">
            <h2>Birganj Govt. Degree College</h2>
            <p>Birganj, Dinajpur</p>
            <span class="doc-title" id="lblExamTitle">Academic Transcript</span>
        </div>

        <div class="student-info-grid">
            <div class="info-item"><strong>Name of Student:</strong> <span id="lblStudentName">-</span></div>
            <div class="info-item"><strong>Roll Number:</strong> <span id="lblRoll">-</span></div>
            <div class="info-item"><strong>Group:</strong> <span id="lblGroup">-</span></div>
            <div class="info-item"><strong>Academic Session:</strong> <span id="lblSession">-</span></div>
            <div class="info-item"><strong>Student Type:</strong> <span id="lblStudentType">-</span></div>
        </div>

        <div class="table-container">
            <table class="table-res" id="marksTable">
                <thead>
                    <tr>
                        <th style="text-align: left;">Subject Name</th>
                        <th>CQ</th>
                        <th>MCQ</th>
                        <th>Practical</th>
                        <th>Total</th>
                        <th>GP</th>
                        <th>Letter Grade</th>
                    </tr>
                </thead>
                <tbody id="marksBody">
                    <!-- Dynamic entries -->
                </tbody>
            </table>
        </div>

        <div class="result-summary" id="summaryContainer">
            <div class="gpa-box" id="lblGPA">GPA: 0.00 | Grade: F</div>
            <div style="font-size: 14px; color: #475569; text-align: right;" id="lblTotals">
                Total Marks (w/o Add): 0 &nbsp;|&nbsp; Total Marks (with Add): 0
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-secondary" onclick="window.history.back()">Back to Search</button>
            <button class="btn btn-primary" onclick="triggerDownload()">Download Official PDF</button>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SB_URL = "https://nsleouvsightlvnwausv.supabase.co";
        const SB_KEY = "sb_publishable_oJJEYg56wJBVRRGBebGaMA_6X_FVmlG";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        const LOGO_SRC = "images/logo.png";

        const subOrderMap = {
            "Arts": ["Bangla", "English", "ICT", "Sociology", "Social Work", "Islamic History & Culture", "Economics", "Civics & Good Governance", "Geography", "Logic"],
            "Science": ["Bangla", "English", "ICT", "Physics", "Chemistry", "Higher Mathematics", "Biology"],
            "Business Studies": ["Bangla", "English", "ICT", "Accounting", "Business Organization & Management", "Production Management & Marketing"]
        };

        let studentData = null;

        // লোকাল লোগোকে Base64 ফরম্যাটে রূপান্তর করার অ্যাসিনক্রোনাস ফাংশন
        async function getLogoBase64() {
            try {
                const response = await fetch(LOGO_SRC);
                const blob = await response.blob();
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(blob);
                });
            } catch (e) {
                console.error("Local logo failed safely.", e);
                return null;
            }
        }

        function showPop(title, msg, type = 'info', onConfirm = null) {
            const overlay = document.getElementById('customPopup');
            const box = overlay.querySelector('.modal-box');
            box.className = 'modal-box ' + type;

            let emoji = "ℹ️";
            if (type === 'error') emoji = "❌";
            else if (type === 'warning') emoji = "⚠️";
            else if (type === 'success') emoji = "✅";

            document.getElementById('popTitle').innerHTML = `<span class="modal-icon">${emoji}</span><br>${title}`;
            document.getElementById('popMsg').innerHTML = msg;

            const btnArea = document.getElementById('popBtns');
            btnArea.innerHTML = '';

            if (onConfirm) {
                const bC = document.createElement('button');
                bC.className = 'modal-btn btn-cancel';
                bC.innerText = 'Cancel';
                bC.onclick = () => overlay.style.display = 'none';

                const bO = document.createElement('button');
                bO.className = 'modal-btn btn-ok';
                bO.innerText = 'Confirm';
                bO.onclick = () => {
                    overlay.style.display = 'none';
                    onConfirm();
                };
                btnArea.append(bC, bO);
            } else {
                const bO = document.createElement('button');
                bO.className = 'modal-btn btn-ok';
                bO.innerText = 'OK';
                bO.onclick = () => overlay.style.display = 'none';
                btnArea.append(bO);
            }
            overlay.style.display = 'flex';
        }

        function getQueryParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                exam: params.get('exam'),
                year: params.get('year'),
                group: params.get('group'),
                roll: params.get('roll')
            };
        }

        async function loadTranscript() {
            const { exam, year, group, roll } = getQueryParams();

            if (!exam || !year || !group || !roll) {
                showPop("Invalid Request", "Query parameters are missing or incomplete. Please search again.", "error", () => {
                    window.history.back();
                });
                return;
            }

            const { data, error } = await sb.from('student')
                .select('*')
                .eq('roll', parseInt(roll))
                .eq('student_group', group)
                .eq('exam_name', exam)
                .eq('exam_year', parseInt(year))
                .maybeSingle();

            if (error || !data) {
                showPop("Result Not Found", "No transcript found matching the search criteria in our records.", "error", () => {
                    window.history.back();
                });
                return;
            }

            studentData = data;
            renderTranscript();
        }

        function calcFinals(marks) {
            let tWo = 0, tW = 0, hasF = false, tGP = 0, regC = 0;
            Object.entries(marks).forEach(([s, m]) => {
                const val = m.total === 'Absent' ? 0 : m.total;
                tW += val;
                if(m.type !== 'additional') { 
                    tWo += val; 
                    regC++; 
                    if(m.lg === 'F' || m.lg === 'Absent') hasF = true; 
                    tGP += m.gp; 
                } else {
                    tGP += Math.max(0, m.gp - 2);
                }
            });
            const gpa = (hasF || regC < 6) ? "0.00" : Math.min(5, tGP / 6).toFixed(2);
            return { tWo, tW, gpa, lg: gpa >= 5 ? 'A+' : gpa >= 4 ? 'A' : gpa >= 3.5 ? 'A-' : gpa >= 3 ? 'B' : gpa >= 2 ? 'C' : gpa >= 1 ? 'D' : 'F' };
        }

        function renderTranscript() {
            document.getElementById('lblExamTitle').innerText = `${studentData.exam_name} - ${studentData.exam_year}`;
            document.getElementById('lblStudentName').innerText = studentData.name;
            document.getElementById('lblRoll').innerText = studentData.roll;
            document.getElementById('lblGroup').innerText = studentData.student_group;
            document.getElementById('lblSession').innerText = studentData.academic_session;
            document.getElementById('lblStudentType').innerText = studentData.student_type;

            const order = subOrderMap[studentData.student_group] || [];
            const sorted = Object.entries(studentData.marks).sort((a,b) => {
                const idxA = order.indexOf(a[0]);
                const idxB = order.indexOf(b[0]);
                return (idxA === -1 ? 99 : idxA) - (idxB === -1 ? 99 : idxB);
            });

            const bodyContainer = document.getElementById('marksBody');
            bodyContainer.innerHTML = '';

            sorted.forEach(([sub, m]) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="text-align: left;"><strong>${sub}</strong> ${m.type === 'additional' ? '(Additional)' : ''}</td>
                    <td>${m.cq}</td>
                    <td>${m.mcq}</td>
                    <td>${m.prac || '-'}</td>
                    <td><strong>${m.total}</strong></td>
                    <td>${m.gp.toFixed(2)}</td>
                    <td><strong>${m.lg}</strong></td>
                `;
                bodyContainer.appendChild(tr);
            });

            const res = calcFinals(studentData.marks);
            const lblGPA = document.getElementById('lblGPA');
            const summaryContainer = document.getElementById('summaryContainer');

            if (parseFloat(res.gpa) > 0) {
                lblGPA.innerText = `GPA: ${res.gpa} | Grade: ${res.lg}`;
                lblGPA.className = "gpa-box";
                summaryContainer.className = "result-summary";
            } else {
                lblGPA.innerText = `GPA: 0.00 | Grade: F (Failed)`;
                lblGPA.className = "gpa-box fail";
                summaryContainer.className = "result-summary fail";
            }

            document.getElementById('lblTotals').innerHTML = `Total Marks (w/o Add): <strong>${res.tWo}</strong> &nbsp;|&nbsp; Total Marks (with Add): <strong>${res.tW}</strong>`;
            document.getElementById('mainContainer').style.display = 'block';
        }

        // কাস্টম পাসওয়ার্ড ডিরেক্টিভ ভিত্তিক ডাউনলোড হ্যান্ডলার
        function triggerDownload() {
            const overlay = document.getElementById('customPopup');
            const box = overlay.querySelector('.modal-box');
            box.className = 'modal-box warning';

            document.getElementById('popTitle').innerHTML = `<span class="modal-icon">🔒</span><br>Download Copy`;
            
            // কাস্টম ইনপুট ও নির্দেশাবলী সহ মেসেজ গঠন করা হয়েছে
            document.getElementById('popMsg').innerHTML = `
                <div style="text-align: left; color: #475569; font-size:14px; line-height: 1.6;">
                    <p style="margin-bottom: 12px;">
                        For print copy contact <strong>Need Computer, College Road, Birganj</strong> or enter password below to download directly:
                    </p>
                    <input type="password" id="popPass" placeholder="Enter password" 
                        style="width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; outline: none; font-size: 14px; text-align: center; margin-top: 5px;">
                    <p id="passError" style="color: var(--danger); font-size: 12.5px; margin-top: 8px; display: none; font-weight: bold; text-align: center;"></p>
                </div>
            `;

            const btnArea = document.getElementById('popBtns');
            btnArea.innerHTML = '';

            const btnCancel = document.createElement('button');
            btnCancel.className = 'modal-btn btn-cancel';
            btnCancel.innerText = 'Cancel';
            btnCancel.onclick = () => overlay.style.display = 'none';

            const btnConfirm = document.createElement('button');
            btnConfirm.className = 'modal-btn btn-ok';
            btnConfirm.innerText = 'Download';
            btnConfirm.onclick = async () => {
                const userPass = document.getElementById('popPass').value.trim();
                const correctPassword = "bgc123"; // ডিফল্ট পাসওয়ার্ড এখানে পরিবর্তন করতে পারেন

                if (userPass === correctPassword) {
                    overlay.style.display = 'none';
                    await downloadOfficialPDF();
                } else {
                    const errEl = document.getElementById('passError');
                    errEl.innerText = "Incorrect Password! Contact Need Computer.";
                    errEl.style.display = "block";
                }
            };

            btnArea.append(btnCancel, btnConfirm);
            overlay.style.display = 'flex';

            // ইনপুট ফিল্ড স্বয়ংক্রিয়ভাবে ফোকাস করার সুবিধার্থে
            setTimeout(() => {
                document.getElementById('popPass').focus();
            }, 100);
        }

        async function downloadOfficialPDF() {
            const logoData = await getLogoBase64();
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const res = calcFinals(studentData.marks);

            doc.setDrawColor(26, 188, 156); doc.setLineWidth(0.6);
            doc.rect(8, 8, 194, 281); 
            doc.setDrawColor(52, 73, 94); doc.setLineWidth(0.25);
            doc.rect(9.5, 9.5, 191, 278); 

            if (logoData) {
                doc.addImage(logoData, 'PNG', 20, 20, 18, 18);
            }
            doc.setFontSize(22); 
            doc.setTextColor(26, 188, 156); 
            doc.setFont(undefined, 'bold');
            doc.text("Birganj Govt. Degree College", 41, 28); 
            doc.setFontSize(10); 
            doc.setTextColor(80, 80, 80); 
            doc.setFont(undefined, 'normal');
            doc.text("Birganj, Dinajpur", 41, 34);
            
            doc.setFontSize(14); 
            doc.setTextColor(52, 73, 94); 
            doc.setFont(undefined, 'bold');
            doc.text("Official Academic Transcript", 41, 41);
            doc.setFontSize(11);
            doc.setTextColor(100, 100, 100);
            doc.setFont(undefined, 'normal');
            doc.text(`${studentData.exam_name} - ${studentData.exam_year}`, 41, 47);

            doc.setDrawColor(26, 188, 156); doc.setLineWidth(0.4);
            doc.line(20, 50, 190, 50);

            doc.setFillColor(248, 250, 252); doc.roundedRect(20, 54, 170, 22, 3, 3, 'F'); 
            doc.setFontSize(10); doc.setTextColor(0); doc.setFont(undefined, 'bold');
            doc.text(`Name: ${studentData.name}`, 24, 60);
            doc.setFont(undefined, 'normal');
            doc.text(`Roll: ${studentData.roll}   |   Group: ${studentData.student_group}`, 24, 65);
            doc.text(`Academic Session: ${studentData.academic_session}   |   Student Type: ${studentData.student_type}`, 24, 71);

            const order = subOrderMap[studentData.student_group] || [];
            const sorted = Object.entries(studentData.marks).sort((a,b) => {
                const idxA = order.indexOf(a[0]);
                const idxB = order.indexOf(b[0]);
                return (idxA === -1 ? 99 : idxA) - (idxB === -1 ? 99 : idxB);
            });

            const body = sorted.map(([s,m]) => [s+(m.type==='additional'?' (Add)':''), m.cq, m.mcq, m.prac||'-', m.total, m.gp.toFixed(2), m.lg]);

            doc.autoTable({ 
                startY: 83, 
                head: [['Subject','CQ','MCQ','Prac','Total','GP','LG']], 
                body, 
                theme: 'grid', 
                headStyles: { fillColor: [26, 188, 156], fontStyle: 'bold' },
                styles: { cellPadding: 4.8, fontSize: 10, valign: 'middle', halign: 'center' }, 
                columnStyles: { 0: { halign: 'left' } },
                alternateRowStyles: { fillColor: [250, 252, 253] }
            });

            if (logoData) {
                try { 
                    doc.setGState(new doc.GState({opacity: 0.06})); 
                    doc.addImage(logoData, 'PNG', 50, 95, 110, 110); 
                    doc.setGState(new doc.GState({opacity: 1})); 
                } catch(e){}
            }

            const fY = doc.lastAutoTable.finalY + 12;
            doc.setFillColor(230, 247, 245); doc.roundedRect(20, fY, 65, 18, 2, 2, 'F');
            doc.setFont(undefined, 'bold'); doc.setFontSize(11); doc.setTextColor(26, 188, 156);
            doc.text(`GPA: ${res.gpa}   |   Grade: ${res.lg}`, 24, fY + 11);

            doc.setTextColor(0); doc.setFontSize(10);
            doc.text(`Total Marks (w/o Add): ${res.tWo}`, 125, fY + 7);
            doc.text(`Total Marks (with Add): ${res.tW}`, 125, fY + 13);

            const principalY = Math.max(262, fY + 36); 
            doc.setDrawColor(180, 180, 180); doc.setLineWidth(0.3);
            doc.line(150, principalY, 190, principalY); doc.setFont(undefined, 'bold');
            doc.text("Principal", 160, principalY + 5);

            doc.save(`Official_Transcript_${studentData.roll}_${studentData.student_group}.pdf`);
        }
    </script>
</body>
</html>
